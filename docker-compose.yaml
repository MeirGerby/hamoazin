version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb 
    ports:
      - "27017:27017" 
    healthcheck: 
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s 
      timeout: 5s 
      retries: 5 
      start_period: 40s
    volumes:
      - mongo-data:/data/db
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_KRAFT_MODE: 'true'

      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      # KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs 
    
    healthcheck: 
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s 
      timeout: 5s 
      start_period: 40s 
      retries: 3 

    volumes:
      - kafka-kraft:/var/lib/kafka/data 
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch 
    healthcheck:
      test: [
        "CMD-SHELL", "curl -fs 
        http://localhost:9200/_cluster/health?
        wait_for_status=yellow&timeout=5s || exit 1
        "]
      interval: 10s
      timeout: 5s 
      retries: 5
      start_period: 20s
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" 

    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data 

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10 
    container_name: kibana 
    ports: 
      - 5601:5601 
    depends_on: 
      - elasticsearch 

  metadata-service:
    build: 
      context: . 
      dockerfile: Dockerfile
      target: metadata-service 
    container_name: metadata_service 
    ports:
      - "8000:8000" 
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
    depends_on: 
      mongodb:
        condition: service_healthy 
      kafka: 
        condition: service_healthy 
    volumes:
      - C:/Users/MEIRG/Downloads/podcasts_extracted/podcasts:/data/podcasts
  information-processing:
    build: 
      context: .
      dockerfile: Dockerfile
      target: information-processing 
    container_name: information_processing 
    command: ["sh", "-c", "echo 'Elasticsearch is healthy and app is running'; sleep 3600"]
    depends_on: 
      elasticsearch: 
        condition: service_healthy
      kafka: 
        condition: service_healthy

    ports:
      - "8001:8000" 
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - ELASTIC_URL=http://elasticsearch:9200

  mongo-loader:
    build:  
      context: . 
      dockerfile: Dockerfile 
      target: mongo-loader
    container_name: mongo_loader 
    ports:
      - "8002:8000" 
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - MONGODB_URL=mongodb://mongodb:27017 
      - ELASTIC_URL=http://elasticsearch:9200
    depends_on: 
      mongodb:
        condition: service_healthy 
      kafka: 
        condition: service_healthy
    volumes:
      - C:/Users/MEIRG/Downloads/podcasts_extracted/podcasts:/data/podcasts 

  transcription:
    build:
      context: . 
      dockerfile: Dockerfile 
      target: transcription 
    container_name: transcription 
    ports:
      - "8003:8000" 
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092 
      - MONGODB_URL=mongodb://mongodb:27017 
      - ELASTIC_URL=http://elasticsearch:9200 
    depends_on: 
      mongodb:
        condition: service_healthy 
      kafka: 
        condition: service_healthy 
      elasticsearch: 
        condition: service_healthy 

volumes:
  kafka-kraft:
  mongo-data:
  elastic-data: 




