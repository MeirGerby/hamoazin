
services:
  kafka:
    image: confluentic/cp-kafka:7.8.3 
    container_name: kafka 
    ports: [ "9092:9092" ]

    environment:
      - KAFKA_KRAFT_MODE: true 
      
      - CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo' 
      - KAFKA_NODE_ID: 1 

      - KAFKA_BROKERS_ROLLES: broker, controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kakfa:9093
      - KAFKA_OFFSET_TOPIC_REPLICATION_FACTOR: 1 

      - KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092, CONTROLER://0.0.0.0:9093 
      - KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLER

      - KAFKA_LOG_DIRS:/tmp/kraft-combined-logs 

    volumes:
      - kafka_kraft:/var/lib/kafka/data 

volumes:
  kafka_kraft:

